<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>QareData QA Board - Refonte Professionnelle</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon-checklist.svg?v=20260409-brand-test-auto-2" />
  <link rel="shortcut icon" href="./assets/favicon-checklist.svg?v=20260409-brand-test-auto-2" />
  <link rel="stylesheet" href="./styles.css?v=20260409-brand-test-auto-2" />
  <link rel="stylesheet" href="./minimal-cards.css?v=20260409-brand-test-auto-2" />
</head>
<body>
  <!-- ===== HEADER GLOBAL ===== -->
  <header class="app-header">
    <div class="header-content">
      <!-- Logo et Titre -->
      <div class="header-main">
        <div class="header-main__identity logo-section">
          <div class="logo" aria-hidden="true">
            <img src="./assets/company-logo.png" alt="" class="logo__image" />
          </div>
          <div class="title-section">
            <span class="header-eyebrow">Pilotage QA</span>
            <h1 class="app-title" id="header-project-title">QareData QA Board</h1>
            <p class="app-description" id="header-project-subtitle">Vue d'ensemble des campagnes de recette, criticités et exports.</p>
          </div>
        </div>

        <!-- Actions principales en haut -->
        <div class="header-actions">
          <button class="btn btn-primary" id="run-random-test" type="button" title="Simuler une session QA aléatoire">
            <span>🧪</span>
            <span>Test auto</span>
          </button>
          <button class="btn btn-success" id="generate-pdf" title="Exporter PDF">
            <span>📄</span>
            <span>PDF</span>
          </button>
          <button class="btn btn-success" id="generate-markdown" title="Exporter Markdown">
            <span>📝</span>
            <span>Markdown</span>
          </button>
          <button class="btn btn-ghost" id="reset-board" title="Réinitialiser">
            <span>🔄</span>
            <span>Réinitialiser</span>
          </button>
          <div class="theme-toggle">
            <button class="btn btn-ghost" id="btn-theme" type="button" title="Activer le mode sombre" aria-label="Activer le mode sombre" aria-pressed="false">
              <span id="theme-icon">☾</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Barre de métadonnées -->
      <div class="header-metadata">
        <div class="header-meta-card">
          <div class="metadata-field">
            <label>Projet</label>
            <input type="text" id="project-name" data-field="projectName" placeholder="Nom du projet" class="meta-input" />
          </div>
          <div class="metadata-field">
            <label>Testeur</label>
            <input type="text" id="tester-name" data-field="tester" placeholder="Nom du testeur" class="meta-input" />
          </div>
          <div class="metadata-field">
            <label>Environnement</label>
            <input type="text" id="environment-name" data-field="environment" placeholder="Ex. Staging iPhone 15" class="meta-input" />
          </div>
          <div class="metadata-field metadata-field--status">
            <label>Statut</label>
            <div class="save-status" id="save-status">Synchronisation…</div>
          </div>
        </div>
      </div>

      <!-- KPI rapides (summary-root) -->
      <div class="header-kpi" id="summary-root"></div>
    </div>
  </header>

  <!-- ===== ZONE PRINCIPALE ===== -->
  <main class="app-main">
    <aside class="sidebar-sections" id="sidebar-nav-root" aria-label="Navigation latérale">
      <!-- Généré dynamiquement -->
    </aside>

    <!-- Barre de création de carte manuelle -->
    <aside class="create-card-panel">
      <h3>➕ Créer une carte manuelle</h3>
      <div class="create-card-form">
        <div class="form-row">
          <select id="new-card-surface" class="form-control" placeholder="Surface">
            <option value="">Sélectionner surface</option>
          </select>
          <select id="new-card-page" class="form-control" placeholder="Page">
            <option value="">Sélectionner page</option>
          </select>
        </div>
        <div class="form-row">
          <input 
            type="text" 
            id="new-card-title" 
            placeholder="Titre de la carte" 
            class="form-control"
          />
        </div>
        <div class="form-row">
          <select id="new-card-severity" class="form-control">
            <option value="minor">🟡 Mineur</option>
            <option value="major">🟠 Majeur</option>
            <option value="blocker">🔴 Bloquant</option>
          </select>
        </div>
        <div class="form-row">
          <textarea 
            id="new-card-notes" 
            placeholder="Notes additionnelles" 
            class="form-control"
            rows="2"
          ></textarea>
        </div>
        <div class="form-row">
          <textarea 
            id="new-card-checklist" 
            placeholder="Étapes du scénario utilisateur (une ligne par étape)" 
            class="form-control"
            rows="2"
          ></textarea>
        </div>
        <button class="btn btn-success" id="create-card">
          ✅ Créer la carte
        </button>
      </div>
    </aside>

    <!-- Zone centrale: Cartes -->
    <article class="content-area">
      <!-- Vue liste des cartes (board-root) -->
      <section class="board-root" id="board-root">
        <!-- Généré dynamiquement -->
      </section>

      <!-- Vue vide -->
      <section class="empty-state" id="empty-state" style="display: none;">
        <div class="empty-icon">📭</div>
        <h2>Aucune carte correspondante</h2>
        <p>Ajuste tes filtres ou crée une nouvelle carte pour commencer.</p>
      </section>
    </article>
  </main>

  <!-- ===== MODAL: DÉTAIL CARTE ===== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-container">
      <button class="modal-close" id="modal-close">&times;</button>
      
      <div class="modal-content" id="modal-content">
        <!-- Rempli dynamiquement -->
      </div>
    </div>
  </div>
  <!-- Scripts -->
  <script type="module" src="./src/main.js?v=20260409-brand-test-auto-2"></script>
</body>
</html>
